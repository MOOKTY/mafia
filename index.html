<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mafia — The Social Deduction Game</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<!-- ═══════════════════════ HOME SCREEN ═══════════════════════ -->
<div id="screen-home" class="screen active">
  <div class="home-header">
    <h1 class="home-title">MAFIA</h1>
    <p class="home-subtitle">The Social Deduction Game</p>
  </div>

  <div class="home-cards">

    <!-- CREATE ROOM -->
    <div class="home-card" id="create-card">
      <h2>Create Room</h2>

      <div class="form-group">
        <label>Your Name</label>
        <input type="text" id="create-name" placeholder="Enter your name" maxlength="20" autocomplete="off">
      </div>

      <div style="border-top:1px solid var(--border); padding-top:1rem; margin-bottom:1rem;">
        <div style="font-family:'Courier Prime',monospace; font-size:0.75rem; text-transform:uppercase; letter-spacing:0.1em; color:var(--text-muted); margin-bottom:0.75rem;">Game Settings</div>

        <div class="settings-grid">
          <label>Total Players</label>
          <input type="number" id="setting-total" value="6" min="3" max="20">

          <label>Mafia Count</label>
          <input type="number" id="setting-mafia" value="2" min="1" max="10">
        </div>

        <div class="toggle-row">
          <label class="toggle">
            <input type="checkbox" id="setting-doctor" checked>
            <span class="toggle-slider"></span>
          </label>
          <label for="setting-doctor">Doctor (heals one player per night)</label>
        </div>
        <div class="toggle-row">
          <label class="toggle">
            <input type="checkbox" id="setting-police" checked>
            <span class="toggle-slider"></span>
          </label>
          <label for="setting-police">Police (investigates one player per night)</label>
        </div>
      </div>

      <div class="role-summary" id="role-summary">Calculating...</div>

      <button class="btn btn-primary" id="btn-create">Create Room</button>
      <div class="error-msg" id="create-error"></div>
    </div>

    <!-- JOIN ROOM -->
    <div class="home-card">
      <h2>Join Room</h2>

      <div class="form-group">
        <label>Your Name</label>
        <input type="text" id="join-name" placeholder="Enter your name" maxlength="20" autocomplete="off">
      </div>

      <div class="form-group">
        <label>Room Code</label>
        <input type="text" id="join-code" placeholder="ABCDEF" maxlength="6"
          style="text-transform:uppercase; letter-spacing:0.2em; font-family:'Courier Prime',monospace; font-size:1.3rem;">
      </div>

      <button class="btn btn-primary" id="btn-join">Join Room</button>
      <div class="error-msg" id="join-error"></div>
    </div>

  </div>
</div>

<!-- ═══════════════════════ GAME SCREEN ═══════════════════════ -->
<div id="screen-game" class="screen">
  <div class="game-layout">

    <!-- HEADER -->
    <header class="game-header">
      <span class="game-title">MAFIA</span>

      <div class="phase-badge" id="phase-badge">
        <span id="phase-icon">🎭</span>
        <span id="phase-text">Lobby</span>
      </div>

      <div class="timer-container" id="timer-container" style="display:none">
        <div class="timer-label">
          <span id="timer-label-text">Time remaining</span>
          <span id="timer-seconds">--</span>
        </div>
        <div class="timer-bar">
          <div class="timer-fill" id="timer-fill"></div>
        </div>
      </div>

      <span class="round-badge" id="round-badge"></span>
      <div class="my-role-badge role-unknown" id="my-role-badge">Spectator</div>
    </header>

    <!-- PLAYERS SIDEBAR -->
    <aside class="players-panel">
      <div class="panel-title">Players</div>
      <div id="players-list"></div>
    </aside>

    <!-- MAIN CONTENT AREA -->
    <main class="game-main" id="game-main">
      <!-- Content rendered by JS -->
    </main>

    <!-- CHAT PANEL -->
    <aside class="chat-panel">
      <div class="chat-header">
        <span>Chat</span>
        <button class="chat-type-btn active" id="chat-tab-public">Public</button>
        <button class="chat-type-btn" id="chat-tab-mafia" style="display:none">🔴 Mafia</button>
      </div>
      <div class="chat-messages" id="chat-messages"></div>
      <div class="chat-input-area">
        <input type="text" class="chat-input" id="chat-input"
          placeholder="Type a message..." maxlength="300" autocomplete="off">
        <button class="chat-send-btn" id="chat-send">Send</button>
      </div>
    </aside>

  </div>
</div>

<!-- ═══════════════════════ TOAST CONTAINER ═══════════════════ -->
<div id="toast-container"></div>

<!-- ═══════════════════════ RESTART MODAL ═══════════════════════ -->
<div class="overlay hidden" id="restart-overlay">
  <div class="modal">
    <h2>Restart Game</h2>
    <p style="color:var(--text-secondary); margin-bottom:1.5rem; font-size:0.9rem;">
      All players stay. Roles will be reassigned. You can adjust settings below.
    </p>

    <div class="settings-grid">
      <label>Total Players</label>
      <input type="number" id="restart-total" value="6" min="3" max="20">
      <label>Mafia Count</label>
      <input type="number" id="restart-mafia" value="2" min="1" max="10">
    </div>
    <div class="toggle-row" style="margin-top:0.5rem;">
      <label class="toggle">
        <input type="checkbox" id="restart-doctor">
        <span class="toggle-slider"></span>
      </label>
      <label for="restart-doctor">Doctor</label>
    </div>
    <div class="toggle-row">
      <label class="toggle">
        <input type="checkbox" id="restart-police">
        <span class="toggle-slider"></span>
      </label>
      <label for="restart-police">Police</label>
    </div>
    <div class="role-summary" id="restart-summary" style="margin-top:0.75rem;"></div>

    <div class="modal-actions">
      <button class="btn btn-secondary" id="btn-cancel-restart">Cancel</button>
      <button class="btn btn-primary" style="width:auto; margin-top:0;" id="btn-confirm-restart">Restart</button>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/js/timer.js"></script>
<script src="/js/ui.js"></script>
<script src="/js/game.js"></script>
</body>
</html>
